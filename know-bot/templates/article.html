<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ title }} - Know_Bot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', 'PingFang TC', sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    line-height: 1.8;
    padding: 16px;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 860px; margin: 0 auto; }

  .header {
    border-bottom: 1px solid #30363d;
    padding-bottom: 16px;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 1.5em;
    color: #58a6ff;
    margin-bottom: 10px;
    word-break: break-word;
    line-height: 1.4;
  }
  .meta {
    font-size: 0.82em;
    color: #8b949e;
    line-height: 1.6;
  }
  .meta .row { margin: 2px 0; }
  .meta a { color: #58a6ff; text-decoration: none; }
  .meta a:hover { text-decoration: underline; }

  .badge {
    display: inline-block;
    background: #1f6feb;
    color: #fff;
    font-size: 0.72em;
    padding: 2px 10px;
    border-radius: 12px;
    margin-right: 6px;
  }

  .content {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 16px;
    overflow-wrap: break-word;
  }
  .content h2 { color: #58a6ff; font-size: 1.25em; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid #21262d; }
  .content h3 { color: #d2a8ff; font-size: 1.1em; margin: 16px 0 8px; }
  .content h4 { color: #f0883e; font-size: 1em; margin: 12px 0 6px; }
  .content h5, .content h6 { color: #c9d1d9; font-size: 0.95em; margin: 10px 0 6px; }
  .content p { margin: 8px 0; }
  .content div, .content section, .content article, .content figure, .content figcaption, .content details, .content summary { margin: 4px 0; }
  .content nav, .content aside { margin: 4px 0; opacity: 0.85; }
  .content ul, .content ol { margin: 8px 0 8px 20px; }
  .content li { margin: 4px 0; line-height: 1.7; }
  .content a { color: #58a6ff; word-break: break-all; }
  .content a:hover { text-decoration: underline; }
  .content span { display: inline; }
  .content blockquote {
    border-left: 3px solid #30363d;
    padding: 8px 12px;
    color: #8b949e;
    margin: 12px 0;
    background: #0d1117;
    border-radius: 0 6px 6px 0;
  }
  .content code {
    background: #1f2937;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.88em;
    color: #f0c674;
  }
  .content pre {
    background: #1f2937;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 14px;
    overflow-x: auto;
    margin: 12px 0;
    font-size: 0.88em;
  }
  .content pre code { background: none; padding: 0; color: inherit; }
  .content img { max-width: 100%; border-radius: 6px; margin: 12px 0; }
  .content hr { border: none; border-top: 1px solid #30363d; margin: 20px 0; }
  .content strong { color: #e6edf3; }
  .content em { color: #79c0ff; }
  .content table { width: 100%; border-collapse: collapse; margin: 12px 0; }
  .content th, .content td { border: 1px solid #30363d; padding: 8px 12px; text-align: left; }
  .content th { background: #21262d; color: #e6edf3; font-weight: 600; }

  .tags { margin: 12px 0; }
  .tag {
    display: inline-block;
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    padding: 3px 10px;
    border-radius: 14px;
    font-size: 0.8em;
    margin: 3px 4px 3px 0;
  }

  .footer {
    text-align: center;
    color: #484f58;
    font-size: 0.78em;
    padding: 16px 0;
    border-top: 1px solid #30363d;
  }

  .summary-box {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .summary-box .label {
    color: #8b949e;
    font-size: 0.82em;
    margin-bottom: 6px;
  }
  .summary-box .text {
    color: #e6edf3;
    font-style: italic;
    line-height: 1.6;
  }

  .source-info {
    display: inline-block;
    background: #1f6feb22;
    border: 1px solid #1f6feb44;
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 0.8em;
    color: #58a6ff;
    margin-top: 6px;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>{{ title }}</h1>
    <div class="meta">
      <div class="row">🆔 {{ id }}</div>
      <div class="row">📅 {{ date }}</div>
      <div class="source-info">🌐 {{ source_domain }}</div>
    </div>
    {{ tags_html }}
  </div>

  {{ summary_html }}

  <div class="content">
    {{ content_html }}
  </div>

  <div class="footer">
    📚 由 Know_Bot 保存 · {{ date }}
  </div>

</div>
</body>
</html>
